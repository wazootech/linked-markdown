name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Build HTML pages
        run: |
          for f in $(find . -name '*.md' -not -path './.github/*' -not -path './.git/*'); do
            dir=$(dirname "$f")
            base=$(basename "$f" .md)
            mkdir -p "$dir"
            pandoc "$f" -f markdown -t html -s \
              --metadata title="Linked Markdown Protocol" \
              -o "$dir/$base.html"
          done

          # Inject shared styles after pandoc's default CSS
          echo '<style>' > _style.html
          cat style.css >> _style.html
          echo '</style>' >> _style.html
          for html in $(find . -name '*.html'); do
            sed -i '/<\/style>/{
              r _style.html
            }' "$html"
          done
          rm _style.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
