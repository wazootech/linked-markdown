name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Build HTML pages
        run: |
          mkdir -p _site
          while IFS= read -r -d '' f; do
            rel="${f#./}"
            dir="$(dirname "$rel")"
            base="$(basename "$rel" .md)"

            if [ "$dir" = "." ]; then
              if [ "$base" = "README" ]; then
                pandoc "$f" -f markdown -t html -s \
                  --metadata title="Linked Markdown Protocol" \
                  -o "_site/index.html"
              fi
              continue
            fi

            mkdir -p "_site/$dir"

            if [ "$base" = "index" ]; then
              out="_site/$dir/index.html"
            elif [ "$base" = "README" ] && [ ! -f "$dir/index.md" ]; then
              out="_site/$dir/index.html"
            else
              out="_site/$dir/$base.html"
            fi

            pandoc "$f" -f markdown -t html -s \
              --metadata title="Linked Markdown Protocol" \
              -o "$out"
          done < <(find . -name '*.md' -not -path './.github/*' -not -path './.git/*' -not -path './_site/*' -not -path './conformance/*' -print0)

          echo '<style>' > _style.html
          cat style.css >> _style.html
          echo '</style>' >> _style.html
          for html in $(find _site -name '*.html'); do
            sed -i '/<\/style>/{
              r _style.html
            }' "$html"
          done
          rm _style.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
